<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" /> <!-- Slate 900 -->
      <stop offset="100%" stop-color="#1e3a8a" /> <!-- Blue 900 -->
    </linearGradient>
    <linearGradient id="atom" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#60a5fa" /> <!-- Blue 400 -->
      <stop offset="100%" stop-color="#818cf8" /> <!-- Indigo 400 -->
    </linearGradient>
  </defs>
  
  <!-- Background with slightly rounded corners -->
  <rect width="512" height="512" rx="120" fill="url(#bg)" />
  
  <!-- Atom Symbol -->
  <g transform="translate(256 256) scale(1.6)">
    <!-- Nucleus -->
    <circle cx="0" cy="0" r="14" fill="url(#atom)" />
    <!-- Electron Orbits -->
    <ellipse cx="0" cy="0" rx="70" ry="22" fill="none" stroke="url(#atom)" stroke-width="6" transform="rotate(0)" />
    <ellipse cx="0" cy="0" rx="70" ry="22" fill="none" stroke="url(#atom)" stroke-width="6" transform="rotate(60)" />
    <ellipse cx="0" cy="0" rx="70" ry="22" fill="none" stroke="url(#atom)" stroke-width="6" transform="rotate(120)" />
  </g>
</svg>
